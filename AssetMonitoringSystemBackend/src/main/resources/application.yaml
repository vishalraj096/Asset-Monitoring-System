spring:
  application:
    name: AssetMonitoringSystem

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=AssetMonitoringSystem;encrypt=true;trustServerCertificate=true
    username: testuser
    password: ${DB_PASSWORD}
    driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  mail:
    host: smtp.gmail.com
    port: 587
    username: vishal.raj.contact@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    root: INFO
    com.app.assetmonitoringsystem: DEBUG
  file:
    name: logs/asset-monitoring.log